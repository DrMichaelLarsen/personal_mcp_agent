services:
  personal-productivity-mcp:
    image: ghcr.io/drmichaellarsen/personal_mcp_agent:latest
    container_name: personal-productivity-mcp
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - /mnt/user/appdata/personal-productivity-mcp/secrets:/config/secrets:ro
